services:
  postgres:
    image: postgres:16
    container_name: notes_api_db
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - notes_pgdata:/var/lib/postgresql/data

volumes:
  notes_pgdata: